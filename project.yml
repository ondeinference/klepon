name: Klepon
options:
  deploymentTarget:
    iOS: "18.5"
    watchOS: "9.0"
  xcodeVersion: "26.0"
  generateEmptyDirectories: false
  createIntermediateGroups: false

packages:
  Onde:
    url: https://github.com/ondeinference/onde-swift
    exactVersion: 1.0.0

schemes:
  Klepon:
    build:
      targets:
        Klepon: all
    run:
      config: Debug
    analyze:
      config: Debug
    archive:
      config: Release
    profile:
      config: Release
  Klepon Watch:
    build:
      targets:
        Klepon Watch: all
    run:
      config: Debug
    analyze:
      config: Debug
    archive:
      config: Release
    profile:
      config: Release

targets:
  Klepon:
    type: application
    platform: iOS
    sources:
      - path: Klepon
    entitlements:
      path: Klepon/Klepon.entitlements
    dependencies:
      - package: Onde
        product: Onde
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.splitfire.klepon
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: 1
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIUserInterfaceStyle: Light
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        "EXCLUDED_ARCHS[sdk=iphonesimulator*]": x86_64
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: -Onone
        Release:
          SWIFT_OPTIMIZATION_LEVEL: -O

  KleponWatch:
    name: Klepon Watch
    type: application
    platform: watchOS
    sources:
      - path: KleponWatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.splitfire.klepon.watchkitapp
        PRODUCT_NAME: Klepon Watch
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: ""
        SDKROOT: watchos
        TARGETED_DEVICE_FAMILY: 4
        SKIP_INSTALL: YES
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/Frameworks"
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: YES
        "EXCLUDED_ARCHS[sdk=watchsimulator*]": x86_64
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: -Onone
        Release:
          SWIFT_OPTIMIZATION_LEVEL: -O
